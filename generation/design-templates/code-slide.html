<!--
TEMPLATE: Code Slide
DESCRIPTION: Slide for displaying and explaining a code example.
USE WHEN: Showing syntax, demonstrating how a function works, or walking through a code snippet.
PLACEHOLDERS:
  - SLIDE_TITLE: Heading describing what the code demonstrates (1 short phrase).
  - LANGUAGE_LABEL: Programming language displayed in the badge (e.g. "Python", "JavaScript", "Java").
  - CODE_CONTENT: The code to display. Use plain text — preserve indentation with spaces.
                  For inline color emphasis, wrap tokens in <span style="color: VAR"> using
                  the code theme variables defined in :root (--code-keyword, --code-string, etc.).
  - ANNOTATION: Optional one-sentence explanation shown beneath the code block.
                Delete the entire <p class="annotation"> element if not needed.
CONSTRAINTS:
  - Do not modify the boilerplate <style> or <script> blocks.
  - Do not change font imports, CSS variable definitions, or layout px values.
  - Do not add syntax highlighting libraries — use inline <span> tags for color if needed.
  - Do not use var(--color-aqua) unless this slide is specifically about an AI feature.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Slide</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;

      /* Code block color theme */
      --code-bg:       #1E1E2E;
      --code-text:     #CDD6F4;
      --code-keyword:  #CBA6F7; /* purple — def, return, if, for, etc. */
      --code-string:   #A6E3A1; /* green — string literals */
      --code-comment:  #6C7086; /* muted — # comments */
      --code-number:   #FAB387; /* orange — numeric literals */
      --code-function: #89DCEB; /* cyan — function names */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: top left;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    body {
      display: flex;
      flex-direction: column;
      padding: 64px 80px;
      gap: 32px;
    }

    .slide-header {
      display: flex;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.4s ease both;
    }

    .title {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 40px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
    }

    .code-wrapper {
      flex: 1;
      position: relative;
      animation: fadeIn 0.4s ease 0.1s both;
    }

    .language-badge {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--color-gray-dark);
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 12px;
      border-radius: 6px;
      z-index: 1;
    }

    .code-block {
      width: 100%;
      height: 100%;
      background: var(--code-bg);
      border-radius: 12px;
      padding: 48px 48px 40px;
      overflow: hidden;
    }

    .code-block pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 26px;
      line-height: 1.65;
      color: var(--code-text);
      white-space: pre;
    }

    .annotation {
      font-size: 20px;
      color: var(--color-text-secondary);
      line-height: 1.5;
      padding-left: 8px;
      border-left: 4px solid var(--color-teal);
      animation: fadeIn 0.4s ease 0.2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="slide-header">
    <h1 class="title">SLIDE_TITLE</h1>
  </div>

  <div class="code-wrapper">
    <span class="language-badge">LANGUAGE_LABEL</span>
    <div class="code-block">
      <pre>CODE_CONTENT</pre>
    </div>
  </div>

  <p class="annotation">ANNOTATION</p>

  <!-- Boilerplate: do not modify -->
  <script>
    function resize() {
      document.documentElement.style.transform = `scale(${window.innerWidth / 1600})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
