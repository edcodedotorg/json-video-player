<!--
TEMPLATE: Header with SVG
DESCRIPTION: Heading banner at top with an SVG diagram filling the remaining canvas.
USE WHEN: Showing a flow, process, data visualization, or structured diagram where the
          diagram IS the explanation. The heading frames the diagram; narration provides detail.
          Examples: probability flow, pipeline diagram, bar chart comparison, sentence completion.

PLACEHOLDERS:
  - SLIDE_HEADING: Short heading — max 8 words. Delete the .header div and add class="no-title"
                   to <body> if the heading would just repeat the narration (see toggle below).
  - SVG_CONTENT: Replace the <div class="svg-placeholder"> with an <svg> element:
                 <svg viewBox="0 0 1440 660" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                   ...diagram content...
                 </svg>
                 Start from the matching SVG pattern file (svg-flow.html, svg-bar-chart.html,
                 svg-word-display.html) — do not write SVG from scratch.

CSS CLASS TOGGLE:
  - Default: heading visible, SVG gets the center area.
  - <body class="no-title">: hides the heading, SVG fills the full frame.
    Use this when the heading would simply repeat the narration, or when the diagram needs max space.
    In no-title mode, adjust SVG viewBox to "0 0 1440 820" to use the full height.

SVG NOTES:
  - Reference brand colors via hex (SVG cannot use CSS custom properties):
      Teal: #0093A4  |  Purple: #8C52BA  |  Text Primary: #292F36  |  Text Secondary: #4C5661
      Gray Light: #F7F8FA  |  Gray Medium: #D1D4D8  |  Error: #E02D16  |  Success: #3EA33E
  - Use font-family="Figtree, sans-serif" for all SVG text.
  - Color vocabulary for sequences: teal = user input/trigger, purple = AI/processing, gray = output.

CONSTRAINTS:
  - Do not modify the boilerplate <style> or <script> blocks.
  - Do not change font imports, CSS variable definitions, or layout px values.
  - Do not use #3CFFF7 (aqua) unless this slide is specifically about an AI feature.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Header with SVG</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: top left;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 140px;
      padding: 0 64px;
      display: flex;
      align-items: center;
      background: var(--color-gray-light);
      flex-shrink: 0;
      animation: fadeIn 0.4s ease both;
    }

    .heading {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 64px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
      border-left: 8px solid var(--color-teal);
      padding-left: 24px;
    }

    .svg-area {
      flex: 1;
      padding: 24px 64px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      animation: fadeIn 0.4s ease 0.1s both;
    }

    .svg-area svg {
      width: 100%;
      height: 100%;
    }

    /* Shown when no SVG is provided yet */
    .svg-placeholder {
      width: 100%;
      height: 100%;
      background: var(--color-gray-medium);
      border: 3px dashed var(--color-gray-dark);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--color-gray-dark);
    }

    .svg-placeholder .label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .svg-placeholder .hint {
      font-size: 14px;
    }

    /* ── no-title modifier ── */
    body.no-title .header { display: none; }
    body.no-title .svg-area { padding-top: 48px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Sequence vocabulary comment — fill in before generating connected slides:
       Sequence: [NAME] | [ConceptA]=teal | [ConceptB]=purple | arrows=2px #292F36 -->

  <!-- To hide heading and expand SVG to full frame: change <body> to <body class="no-title"> -->
  <div class="header">
    <h1 class="heading">SLIDE_HEADING</h1>
  </div>

  <div class="svg-area">
    <!--
      SVG_CONTENT: Replace this div with your <svg> element.
      Start from a pattern file (svg-flow.html, svg-bar-chart.html, svg-word-display.html).
      Default viewBox with title: "0 0 1440 660"
      No-title viewBox (full frame): "0 0 1440 820"
    -->
    <div class="svg-placeholder">
      <span class="label">SVG Diagram</span>
      <span class="hint">Replace this div with an &lt;svg&gt; element</span>
    </div>
  </div>

  <!-- Boilerplate: do not modify -->
  <script>
    function resize() {
      document.documentElement.style.transform = `scale(${window.innerWidth / 1600})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
