<!--
TEMPLATE: Bullets with SVG
DESCRIPTION: Heading banner at top, then large-font bullets on the left and an SVG diagram on the right.
USE WHEN: 2–3 key takeaways pair with a diagram — a flow, chart, or structured visual that reinforces
          the bullets. Use this over bullets-with-image when precision matters (data, relationships,
          process steps) and over header-with-svg when there are distinct enumerable points.
PLACEHOLDERS:
  - SLIDE_HEADING: Short heading — max 8 words.
  - BULLETS: Exactly 2 or 3 <li> elements. Each bullet must be 4–5 words maximum.
             The 52px Barlow font makes longer text wrap badly — keep bullets to short clauses.
             Delete the unused <li>. Do NOT add a 4th bullet; split into two slides instead.
  - SVG_CONTENT: Replace the <div class="svg-placeholder"> with an <svg> element:
                 <svg viewBox="0 0 540 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                   ...diagram content...
                 </svg>
                 Start from the matching SVG pattern file (svg-flow.html, svg-bar-chart.html,
                 svg-word-display.html) and adapt the viewBox to the column dimensions.

SVG NOTES:
  - Right column is ~560px wide and fills the main area height (~680px).
  - Use viewBox="0 0 540 640" as a starting point; adjust to your diagram's proportions.
  - Reference brand colors via hex (SVG cannot use CSS custom properties):
      Teal: #0093A4  |  Purple: #8C52BA  |  Text Primary: #292F36  |  Text Secondary: #4C5661
      Gray Light: #F7F8FA  |  Gray Medium: #D1D4D8
  - Use font-family="Figtree, sans-serif" for all SVG text.

CONSTRAINTS:
  - Do not modify the boilerplate <style> or <script> blocks.
  - Do not change font imports, CSS variable definitions, or layout px values.
  - Maximum 3 bullets. Do not add a 4th.
  - Do not use #3CFFF7 (aqua) unless this slide is specifically about an AI feature.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bullets with SVG</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: top left;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 140px;
      padding: 0 64px;
      display: flex;
      align-items: center;
      background: var(--color-gray-light);
      flex-shrink: 0;
      animation: fadeIn 0.4s ease both;
    }

    .heading {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 64px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
      border-left: 8px solid var(--color-teal);
      padding-left: 24px;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 48px;
      padding: 32px 64px 48px;
      align-items: stretch;
      min-height: 0;
    }

    /* Left column: bullets */
    .col-bullets {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.4s ease 0.1s both;
    }

    .bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .bullets li {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 52px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
      border-left: 6px solid var(--color-purple);
      padding-left: 24px;
    }

    /* Right column: SVG diagram */
    .col-svg {
      width: 560px;
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      animation: fadeIn 0.4s ease 0.15s both;
    }

    .svg-area {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .svg-area svg {
      width: 100%;
      height: 100%;
    }

    /* Shown when no SVG is provided yet */
    .svg-placeholder {
      width: 100%;
      height: 100%;
      background: var(--color-gray-medium);
      border: 3px dashed var(--color-gray-dark);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--color-gray-dark);
    }

    .svg-placeholder .label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .svg-placeholder .hint {
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Sequence vocabulary comment — fill in before generating connected slides:
       Sequence: [NAME] | [ConceptA]=teal | [ConceptB]=purple | arrows=2px #292F36 -->

  <div class="header">
    <h1 class="heading">SLIDE_HEADING</h1>
  </div>

  <div class="main">
    <div class="col-bullets">
      <!-- MAX 3 bullets. Each bullet: 4–5 words. Delete unused <li>. -->
      <ul class="bullets">
        <li>BULLET_1</li>
        <li>BULLET_2</li>
        <li>BULLET_3</li>
      </ul>
    </div>

    <div class="col-svg">
      <div class="svg-area">
        <!--
          SVG_CONTENT: Replace this div with your <svg> element.
          Start from a pattern file (svg-flow.html, svg-bar-chart.html, svg-word-display.html).
          Starting viewBox: "0 0 540 640" — adjust to your diagram's proportions.
        -->
        <div class="svg-placeholder">
          <span class="label">SVG Diagram</span>
          <span class="hint">Replace this div with an &lt;svg&gt; element</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Boilerplate: do not modify -->
  <script>
    function resize() {
      document.documentElement.style.transform = `scale(${window.innerWidth / 1600})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
