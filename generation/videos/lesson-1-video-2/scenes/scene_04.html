<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iteration</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: top left;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    body {
      display: flex;
      padding: 48px 64px;
      gap: 48px;
      align-items: stretch;
    }

    .col-quote {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      border-left: 10px solid var(--color-teal);
      padding-left: 40px;
      animation: fadeIn 0.4s ease both;
    }

    .heading {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 96px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.05;
    }

    .subheading {
      font-size: 36px;
      font-weight: 400;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }

    .col-image {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.4s ease 0.1s both;
    }

    .image {
      height: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      border-radius: 16px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="col-quote">
    <h1 class="heading">Iteration</h1>
    <p class="subheading">Observe, refine, repeat — like coaching a teammate.</p>
  </div>

  <div class="col-image">
    <img src="C:\Users\Dan\Documents\Claude\ed-json-video-player\json-video-player\generation\tools\generated-images\generated_image_6a87d9af-8808-489d-ba52-966aa3d25997.png" alt="Coach giving encouraging feedback to a player on a bench" class="image">
  </div>

  <!-- Boilerplate: do not modify -->
  <script>
    function resize() {
      document.documentElement.style.transform = `scale(${window.innerWidth / 1600})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
