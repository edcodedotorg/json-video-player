<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add More Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Boilerplate: do not modify ── */
    :root {
      --color-teal:           #0093A4;
      --color-purple:         #8C52BA;
      --color-aqua:           #3CFFF7; /* AI features only */
      --color-error:          #E02D16;
      --color-warning:        #F9CB28;
      --color-success:        #3EA33E;
      --color-info:           #1892E3;
      --color-text-primary:   #292F36;
      --color-text-secondary: #4C5661;
      --color-gray-light:     #F7F8FA;
      --color-gray-medium:    #D1D4D8;
      --color-gray-dark:      #5F6872;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: top left;
      font-family: 'Figtree', sans-serif;
      background: var(--color-gray-light);
      color: var(--color-text-primary);
    }
    /* ── End boilerplate ── */

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 140px;
      padding: 0 64px;
      display: flex;
      align-items: center;
      background: var(--color-gray-light);
      flex-shrink: 0;
      animation: fadeIn 0.4s ease both;
    }

    .heading {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 64px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
      border-left: 8px solid var(--color-teal);
      padding-left: 24px;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 48px;
      padding: 32px 64px 48px;
      align-items: stretch;
      min-height: 0;
    }

    .col-bullets {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.4s ease 0.1s both;
    }

    .bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .bullets li {
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 52px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.1;
      border-left: 6px solid var(--color-purple);
      padding-left: 24px;
    }

    .col-image {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      animation: fadeIn 0.4s ease 0.15s both;
    }

    .image {
      height: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      border-radius: 16px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="heading">Add More Detail</h1>
  </div>

  <div class="main">
    <div class="col-bullets">
      <ul class="bullets">
        <li>Emotions and tone</li>
        <li>Specific topics</li>
        <li>A persona or role</li>
      </ul>
    </div>

    <div class="col-image">
      <img src="C:\Users\Dan\Documents\Claude\ed-json-video-player\json-video-player\generation\tools\generated-images\generated_image_1844c036-b137-4e6d-9999-90903deca6b1.png" alt="Person with thought bubbles showing different roles: debate partner, creative writer, scientist" class="image">
    </div>
  </div>

  <!-- Boilerplate: do not modify -->
  <script>
    function resize() {
      document.documentElement.style.transform = `scale(${window.innerWidth / 1600})`;
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
